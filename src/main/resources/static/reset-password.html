<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

<!-- ✅ SUCCESS / ERROR TOAST -->
<div id="toast"
     class="fixed top-5 right-5 hidden px-6 py-3 rounded-xl shadow-lg text-white z-50 transition-all duration-500">
</div>

<div class="bg-white shadow-xl rounded-xl p-8 w-96 text-center">

    <h2 class="text-2xl font-bold mb-6">Reset Your Password</h2>

    <input type="password"
           id="newPassword"
           placeholder="Enter new password"
           class="w-full p-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

    <button onclick="resetPassword()"
            class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition">
        Reset Password
    </button>

    <p id="message" class="mt-4 font-semibold"></p>

</div>

<script>

    // URL se token read karega
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    /* =======================
       TOAST FUNCTION
    ======================= */
    function showToast(message, type="success") {

        const toast = document.getElementById("toast");
        toast.innerText = message;

        toast.classList.remove("hidden");

        if(type === "success"){
            toast.classList.remove("bg-red-600");
            toast.classList.add("bg-green-600");
        } else {
            toast.classList.remove("bg-green-600");
            toast.classList.add("bg-red-600");
        }

        setTimeout(() => {
            toast.classList.add("hidden");
        }, 3000);
    }

    function resetPassword() {

        const newPassword = document.getElementById("newPassword").value;

        fetch("http://localhost:8080/auth/reset-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "token=" + token + "&newPassword=" + newPassword
        })
        .then(response => response.text().then(text => ({ ok: response.ok, text })))
        .then(result => {

            document.getElementById("message").innerText = result.text;

            if(result.ok){
                document.getElementById("message").classList.remove("text-red-500");
                document.getElementById("message").classList.add("text-green-500");

                showToast(result.text, "success");
            } else {
                document.getElementById("message").classList.remove("text-green-500");
                document.getElementById("message").classList.add("text-red-500");

                showToast(result.text, "error");
            }
        })
        .catch(error => {
            document.getElementById("message").innerText = "Something went wrong";
            document.getElementById("message").classList.add("text-red-500");

            showToast("Something went wrong", "error");
        });
    }

</script>

</body>
</html>
