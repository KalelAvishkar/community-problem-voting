<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<!-- ✅ SUCCESS / ERROR TOAST -->
<div id="toast"
     class="fixed top-5 right-5 hidden px-6 py-3 rounded-xl shadow-lg text-white z-50 transition-all duration-500">
</div>

<div class="bg-white shadow-2xl rounded-2xl p-8 w-96">

    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Community Problem Voting System
    </h2>

    <input type="email"
           id="email"
           placeholder="Enter Email"
           class="w-full p-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

    <input type="password"
           id="password"
           placeholder="Enter Password"
           class="w-full p-3 mb-4 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

    <button onclick="loginUser()"
            class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 transition duration-300">
        Login
    </button>

    <div class="text-center mt-4">
        <a href="#" onclick="forgotPassword()"
           class="text-blue-500 hover:underline text-sm">
            Forgot Password?
        </a>
    </div>

    <p id="msg" class="text-center mt-4 text-red-500"></p>

</div>

<script>

    /* =======================
       TOAST FUNCTION
    ======================= */
    function showToast(message, type="success") {

        const toast = document.getElementById("toast");
        toast.innerText = message;

        toast.classList.remove("hidden");

        if(type === "success"){
            toast.classList.remove("bg-red-600");
            toast.classList.add("bg-green-600");
        } else {
            toast.classList.remove("bg-green-600");
            toast.classList.add("bg-red-600");
        }

        setTimeout(() => {
            toast.classList.add("hidden");
        }, 3000);
    }

    async function loginUser() {

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const response = await fetch("http://localhost:8080/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await response.text();

        if (response.ok) {

            localStorage.setItem("token", data);

            document.getElementById("msg").classList.remove("text-red-500");
            document.getElementById("msg").classList.add("text-green-500");
            document.getElementById("msg").innerText = "Login Successful!";

            showToast("Login Successful!", "success");

            setTimeout(() => {
                window.location.href = "index.html";
            }, 1000);

        } else {

            document.getElementById("msg").classList.remove("text-green-500");
            document.getElementById("msg").classList.add("text-red-500");
            document.getElementById("msg").innerText = data;

            showToast(data, "error");
        }
    }

    async function forgotPassword() {

        const email = document.getElementById("email").value;

        if (!email) {
            document.getElementById("msg").innerText = "Please enter your email first!";
            showToast("Please enter your email first!", "error");
            return;
        }

        const response = await fetch("/auth/forgot-password", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "email=" + encodeURIComponent(email)
        });

        const data = await response.text();

        document.getElementById("msg").innerText = data;

        if(response.ok){
            showToast(data, "success");
        } else {
            showToast(data, "error");
        }
    }

</script>

</body>
</html>
