<!DOCTYPE html>
<html>
<head>
    <title>Create Problem</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<nav class="bg-white shadow-md px-6 py-4 flex justify-between items-center">
    <div class="flex items-center space-x-6">
        <h1 class="text-xl font-bold text-blue-600 cursor-pointer"
            onclick="goDashboard()">Community System</h1>
        <button onclick="goDashboard()" class="text-gray-600 hover:text-blue-600 font-medium">
            Dashboard
        </button>
    </div>
    <button onclick="logout()"
            class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600 transition">
        Logout
    </button>
</nav>

<!-- 🔄 GLOBAL LOADER -->
<div id="loader" class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
        <p class="mt-4 font-semibold text-gray-700">Processing...</p>
    </div>
</div>

<div class="flex items-center justify-center p-6">
    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-lg">

        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
            Create New Problem
        </h2>

        <form class="space-y-4">

            <input type="text" id="title" placeholder="Enter Title" required
                   class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400">

            <textarea id="description" placeholder="Enter Description" required
                      class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400"></textarea>

            <input type="text" id="location" placeholder="Enter Location" required
                   class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-400">

            <input type="file" id="photos" multiple
                   class="w-full border p-2 rounded-lg bg-gray-50">

            <div class="flex justify-between mt-6">
                <button type="button" onclick="goDashboard()"
                        class="bg-gray-400 text-white px-4 py-2 rounded-lg">Back</button>

                <button type="button" onclick="createProblem()"
                        class="bg-blue-500 text-white px-4 py-2 rounded-lg">Create Problem</button>
            </div>

            <p id="msg" class="text-center mt-4 font-semibold"></p>

        </form>
    </div>
</div>

<script>

    function goDashboard(){ window.location.href="index.html"; }
    function logout(){ localStorage.removeItem("token"); window.location.href="login.html"; }
    function showLoader(){ document.getElementById("loader").classList.remove("hidden"); }
    function hideLoader(){ document.getElementById("loader").classList.add("hidden"); }

    async function createProblem(){

    try{
    showLoader();

    const token = localStorage.getItem("token");

    const response = await fetch("http://localhost:8080/problems/create",{
    method:"POST",
    headers:{
    "Authorization":"Bearer "+token,
    "Content-Type":"application/x-www-form-urlencoded"
    },
    body:new URLSearchParams({
    title:document.getElementById("title").value,
    description:document.getElementById("description").value,
    location:document.getElementById("location").value
    })
    });

    if(!response.ok){
    document.getElementById("msg").innerText="Error creating problem";
    document.getElementById("msg").classList.add("text-red-500");
    return;
    }

    const problem = await response.json();

    const photoInput = document.getElementById("photos");
    if(photoInput.files.length>0){
    const formData=new FormData();
    for(let i=0;i<photoInput.files.length;i++){
    formData.append("photos",photoInput.files[i]);
    }
    await fetch(`http://localhost:8080/problems/${problem.id}/photos`,{
    method:"POST",
    headers:{ "Authorization":"Bearer "+token },
    body:formData
    });
    }

    window.location.href="index.html";

    } finally{
    hideLoader();
    }
    }

</script>
</body>
</html>
