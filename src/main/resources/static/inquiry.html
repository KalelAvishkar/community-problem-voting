<!DOCTYPE html>
<html>
<head>
    <title>Raise Inquiry</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<!-- TOAST -->
<div id="toast"
     class="fixed top-5 right-5 hidden px-6 py-3 rounded-xl shadow-lg text-white z-50 transition-all duration-500 transform translate-x-10 opacity-0">
</div>

<div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-lg">

    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
        Raise Inquiry
    </h2>

    <div class="space-y-4">

        <!-- ✅ SELECT PROBLEM -->
        <select id="problemSelect"
                class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">
            <option value="">Select Problem</option>
        </select>

        <input type="text" id="phone"
               placeholder="Enter Phone Number"
               class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400">

        <textarea id="message"
                  placeholder="Enter Message"
                  class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400"></textarea>

        <div class="flex justify-between mt-6">

            <button onclick="goBack()"
                    class="bg-gray-400 text-white px-4 py-2 rounded-lg hover:bg-gray-500 transition">
                Back
            </button>

            <button id="submitBtn"
                    onclick="submitInquiry()"
                    class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition">
                Submit Inquiry
            </button>

        </div>

        <p id="msg" class="text-center mt-4 font-semibold"></p>

    </div>

</div>

<script>

    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "login.html";
    }

    /* =======================
       LOAD PROBLEMS
    ======================= */
    async function loadProblems() {

        try {

            const response = await fetch("http://localhost:8080/problems", {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const problems = await response.json();

            const select = document.getElementById("problemSelect");

            problems.forEach(p => {
                const option = document.createElement("option");
                option.value = p.id;
                option.textContent = p.title;
                select.appendChild(option);
            });

        } catch (error) {
            showToast("Failed to load problems", "error");
        }
    }

    /* =======================
       TOAST FUNCTION
    ======================= */
    function showToast(message, type="success") {

        const toast = document.getElementById("toast");

        toast.innerText = message;
        toast.classList.remove("hidden");

        if(type === "success"){
            toast.classList.remove("bg-red-600");
            toast.classList.add("bg-green-600");
        } else {
            toast.classList.remove("bg-green-600");
            toast.classList.add("bg-red-600");
        }

        setTimeout(() => {
            toast.classList.remove("translate-x-10","opacity-0");
        }, 50);

        setTimeout(() => {
            toast.classList.add("translate-x-10","opacity-0");
            setTimeout(()=> toast.classList.add("hidden"),300);
        }, 3000);
    }

    function goBack() {
        window.location.href = "index.html";
    }

    /* =======================
       SUBMIT INQUIRY
    ======================= */
    async function submitInquiry() {

        const problemId = document.getElementById("problemSelect").value;
        const phone = document.getElementById("phone").value.trim();
        const message = document.getElementById("message").value.trim();
        const btn = document.getElementById("submitBtn");

        if (!problemId) {
            showToast("Please select a problem!", "error");
            return;
        }

        if (!phone || !message) {
            showToast("All fields are required!", "error");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Submitting...";

        try {

            const response = await fetch("http://localhost:8080/inquiries/" + problemId, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    phoneNumber: phone,
                    message: message
                })
            });

            if (response.status === 403) {
                showToast("Unauthorized! Login again.", "error");
                localStorage.removeItem("token");
                setTimeout(()=> window.location.href="login.html",1500);
                return;
            }

            if (response.ok) {

                showToast("Inquiry submitted successfully!", "success");

                document.getElementById("phone").value = "";
                document.getElementById("message").value = "";
                document.getElementById("problemSelect").value = "";

            } else {
                showToast("Error submitting inquiry", "error");
            }

        } catch (error) {
            showToast("Server error!", "error");
        }

        btn.disabled = false;
        btn.innerText = "Submit Inquiry";
    }

    loadProblems();

</script>

</body>
</html>
